---
- name: Start FreshRSS
  when: freshrss_enabled is true
  block:
    - name: Create FreshRSS directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: "{{ item.mode | default('0750') }}"
      loop:
        - path: "{{ docker_data_path }}/{{ freshrss_container_name }}"
        - path: "{{ docker_data_path }}/{{ freshrss_container_name }}/config"
          owner: "{{ freshrss_user_id }}"
          group: "{{ freshrss_group_id }}"

    - name: Create FreshRSS Docker Container
      community.docker.docker_container:
        name: "{{ freshrss_container_name }}"
        image: "lscr.io/linuxserver/freshrss:{{ freshrss_image_version }}"
        pull: true
        restart_policy: "{{ freshrss_restart_policy }}"
        networks:
          - name: traefik
        volumes:
          - "{{ docker_data_path }}/{{ freshrss_container_name }}/config:/config"
        env:
          PGID: "{{ freshrss_group_id }}"
          PUID: "{{ freshrss_user_id }}"
          TZ: "{{ timezone }}"
        labels:
          net.unraid.docker.icon: "{{ freshrss_icon_url }}"
          net.unraid.docker.managed: "dockerman"
          net.unraid.docker.webui: "https://{{ freshrss_hostname }}.{{ domain_name }}"
          traefik.enable: "true"
          traefik.http.routers.freshrss.entrypoints: "https"
          traefik.http.routers.freshrss.middlewares: "auth-chain@file"
          traefik.http.routers.freshrss.rule: "Host(`{{ freshrss_hostname }}.{{ domain_name }}`)"
          traefik.http.routers.freshrss.service: "freshrss"
          traefik.http.services.freshrss.loadbalancer.server.port: "80"
        privileged: true
        security_opts:
          - no-new-privileges:true

- name: Stop FreshRSS
  when: freshrss_enabled is false
  block:
    - name: Stop FreshRSS
      community.docker.docker_container:
        name: "{{ freshrss_container_name }}"
        state: absent
