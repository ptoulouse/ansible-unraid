---
- name: Start Traefik
  when: traefik_enabled is true
  block:
    - name: Check that required variables are defined.
      ansible.builtin.assert:
        that:
          - item | length > 0
        fail_msg: "{{ item }} is not defined."
      loop:
        - traefik_cloudflare_api_token
        - traefik_forward_auth_address

    - name: Create traefik directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: "{{ item.mode | default('0750') }}"
      loop:
        - path: "{{ docker_data_path }}/{{ traefik_container_name }}"
        - path: "{{ docker_data_path }}/{{ traefik_container_name }}/config"
        - path: "{{ docker_data_path }}/{{ traefik_container_name }}/config/rules"

    - name: Create acme.json if it does not exist
      ansible.builtin.copy:
        content: ""
        dest: "{{ docker_data_path }}/{{ traefik_container_name }}/config/acme.json"
        force: false
        owner: root
        group: root
        mode: '0600'

    - name: Create Traefik static configuration file
      ansible.builtin.template:
        src: "traefik.yml.j2"
        dest: "{{ docker_data_path }}/{{ traefik_container_name }}/config/traefik.yml"
        owner: root
        group: root
        mode: '0640'
        lstrip_blocks: true
      register: traefik_config_file

    - name: Create Traefik dynamic configuration file
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "{{ docker_data_path }}/{{ traefik_container_name }}/config/rules/{{ item }}"
        owner: root
        group: root
        mode: '0640'
        lstrip_blocks: true
      loop:
        - hosts.yml
        - middlewares.yml
        - tls-options.yml

    - name: Create Traefik Docker Container
      community.docker.docker_container:
        name: "{{ traefik_container_name }}"
        image: "traefik:{{ traefik_image_version }}"
        recreate: "{{ traefik_config_file is changed }}"
        pull: true
        restart_policy: "{{ traefik_restart_policy }}"
        command:
          - --configFile=/config/traefik.yml
        published_ports:
          - "80:80"
          - "443:443"
        networks:
          - name: "{{ traefik_network }}"
        volumes:
          - "{{ docker_data_path }}/{{ traefik_container_name }}/config:/config"
          - "/var/run/docker.sock:/var/run/docker.sock:ro"
        env:
          CF_DNS_API_TOKEN: "{{ traefik_cloudflare_api_token }}"
          DOMAIN_NAME: "{{ domain_name }}"
          TZ: "{{ timezone }}"
        labels:
          folder.view2: "Base Services"
          net.unraid.docker.icon: "{{ traefik_icon_url }}"
          net.unraid.docker.managed: "dockerman"
          net.unraid.docker.shell: sh
          net.unraid.docker.webui: "https://{{ traefik_hostname }}.{{ domain_name }}"
          traefik.enable: "true"
          # HTTP to HTTPS Redirect
          traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
          traefik.http.routers.http-catchall.entrypoints: http
          traefik.http.routers.http-catchall.middlewares: redirect-to-https
          traefik.http.routers.http-catchall.rule: "HostRegexp(`{host:.+}`)"
          # Traefik Dashboard
          traefik.http.routers.traefik.entrypoints: https
          traefik.http.routers.traefik.middlewares: auth-chain@file
          traefik.http.routers.traefik.rule: "Host(`{{ traefik_hostname }}.{{ domain_name }}`)"
          traefik.http.routers.traefik.service: api@internal
        security_opts:
          - no-new-privileges:true

- name: Stop Traefik
  when: traefik_enabled is false
  block:
    - name: Stop Traefik
      community.docker.docker_container:
        name: "{{ traefik_container_name }}"
        state: absent
