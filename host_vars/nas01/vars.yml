---
# User on remote host. Unraid has only one user: root.
ansible_user: "root"

# Python interpreter to use on the remote host.
ansible_python_interpreter: "{{ python_venv_path }}/bin/python3"

# Domain name for services.
domain_name: "{{ vault_domain_name }}"

# Unraid server hostname.
server_name: "nas01"

timezone: "America/Montreal"

# Default initial admin password for services.
admin_password: "{{ vault_admin_password }}"

# Sender email address for notifications email.
sender_email: "{{ vault_sender_email }}"

# Shares paths.
books_path: "/mnt/user/media/libraries/books"

# Path where Python virtual environment will be created.
python_venv_path: /mnt/user/appdata/python_venv

# Python packages to install in the virtual environment.
python_venv_packages:
  - docker
  - passlib
  - bcrypt
  - requests

# Override default Docker restart policy.
docker_restart_policy: "always"

# Path where Docker containers will store their data.
docker_data_path: "/mnt/user/appdata"

# Enable or disable applications.
calibre_web_enabled: true
cops_enabled: true
dozzle_enabled: true
freshrss_enabled: true
glances_enabled: true
healthchecks_enabled: true
mail_relay_enabled: true
scrutiny_enabled: true

# Mail Relay settings.
mail_relay_smtp_server: "smtp.gmail.com"
mail_relay_smtp_port: "587"
mail_relay_smtp_username: "{{ vault_mail_relay_smtp_username }}"
mail_relay_smtp_password: "{{ vault_mail_relay_smtp_password }}"

# Healthchecks settings.
healthchecks_secret_key: "{{ vault_healthchecks_secret_key }}"

# Scrutiny settings.
scrutiny_devices:
  - /dev/disk/by-id/ata-Samsung_SSD_860_EVO_500GB_S59UNMFN804153R:/dev/sdf
  - /dev/disk/by-id/nvme-WDS500G3X0C-00SJG0_20408A804512:/dev/nvme0
  - /dev/disk/by-id/ata-WDC_WD80EDBZ-11B0ZA0_VRGJ5PSK:/dev/sdc
  - /dev/disk/by-id/ata-WDC_WD80EMZZ-11B4FB0_WD-CA03PHHG:/dev/sdd
  - /dev/disk/by-id/ata-WDC_WD80EMZZ-11B4FB0_WD-CA036WZG:/dev/sde
scrutiny_port: "8081"
