---
# User on remote host. Unraid has only one user: root.
ansible_user: "root"

# Python interpreter to use on the remote host.
ansible_python_interpreter: "{{ python_venv_path }}/bin/python3"

# Domain name for services.
domain_name: "{{ vault_domain_name }}"

# Unraid server hostname.
server_name: "nas01"

timezone: "America/Montreal"

# Default initial admin password for services.
admin_password: "{{ vault_admin_password }}"

# Email address for notifications.
notification_from_address: "{{ vault_notification_from_address }}"
notification_email: "{{ vault_notification_email }}"

# Path where Python virtual environment will be created.
python_venv_path: /mnt/user/appdata/python_venv

# Python packages to install in the virtual environment.
python_venv_packages:
  - docker
  - passlib
  - bcrypt
  - requests

# Override default Docker restart policy.
docker_restart_policy: "always"

# Path where Docker containers will store their data.
docker_data_path: "/mnt/user/appdata"

# Enable or disable applications.
dozzle_enabled: true
freshrss_enabled: true
glances_enabled: true
